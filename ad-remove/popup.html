<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 350px;
        padding: 15px;
        font-family: sans-serif;
      }
      .input-group {
        display: flex;
        gap: 5px;
        margin-bottom: 10px;
      }
      input {
        flex: 1;
        padding: 5px;
        font-size: 12px;
      }
      button {
        cursor: pointer;
      }
      #addBtn {
        width: 100%;
        padding: 8px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        margin-bottom: 15px;
      }

      .rule-item {
        display: flex;
        gap: 5px;
        margin-bottom: 5px;
        align-items: center;
        background: #f8f9fa;
        padding: 5px;
        border-radius: 4px;
      }
      .rule-item span {
        flex: 1;
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .remove-btn {
        background: #ff4d4d;
        color: white;
        border: none;
        padding: 2px 8px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h4>광고 필터 설정</h4>

    <div class="input-group">
      <input type="text" id="urlInput" placeholder="차단할 링크 주소" />
      <input type="text" id="textInput" placeholder="바꿀 문구" />
    </div>
    <button id="addBtn">+ 추가하기</button>

    <hr />
    <div id="ruleList"></div>

    <script src="popup.js"></script>
  </body>
</html>
